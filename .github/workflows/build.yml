name: Build

on: [push, pull_request]

jobs:
  build:
    name: Build XAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Upload XAR
        uses: actions/upload-artifact@v7
        with:
          name: monex-xar
          path: dist/*.xar

  test:
    name: Test (eXist ${{ matrix.exist-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against `latest` and `experimental` for exist v7 with and without full vector support
        exist-version: [latest, experimental]
    services:
      exist:
        image: duncdrum/existdb:${{ matrix.exist-version }}
        ports:
          - 8080:8080
          - 8443:8443
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
      - run: npm ci --ignore-scripts
      # npm ci --ignore-scripts skips Cypress's postinstall binary fetch,
      # so download it explicitly. The binary is cached at ~/.cache/Cypress.
      - name: Install Cypress binary
        run: |
          npx cypress install
      - run: npm run build
      - name: Install XAR
        run: npx --yes @existdb/xst package install dist/monex-*.xar
        env:
          EXISTDB_USER: admin
          EXISTDB_PASS:
      - name: Run Cypress tests
        run: npx cypress run --browser firefox

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
      - run: npm ci --ignore-scripts
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
